name: MERN Docker CI/CD with Versioning

on:
    push:
        branches: [ "main" ]

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: set version
              id: version
              run: echo "VERSION=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}


            - name: Build Frontend 
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/react-app ./frontend

            - name: Push Frontend
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/react-app


    # Backend

            - name: Build Backend
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/express-api ./backend

            - name: Push Backend
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/express-api